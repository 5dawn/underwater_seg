seed: 42

data:
  processed_dir: data/processed
  num_points: 4096
  num_workers: 0
  sample_mode: foreground_balanced
  foreground_ratio: 0.25
  class_names: ["background", "submarine"]
  ignore_index: -1

model:
  num_classes: 2
  input_channels: auto
  dropout: 0.3

train:
  epochs: 80
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  use_class_weights: true
  log_dir: runs/pointnet
  checkpoint_dir: checkpoints
  best_metric: submarine_iou

augment:
  enabled: true
  rotate_z: true
  jitter_std: 0.005
  jitter_clip: 0.02
  scale_min: 0.95
  scale_max: 1.05
  shift_std: 0.02
  point_dropout: 0.05
