seed: 42

data:
  processed_dir: data/processed
  num_points: 4096
  num_workers: 0
  samples_per_cloud: 32
  cache_data: true
  sample_mode: foreground_balanced
  foreground_ratio: 0.10
  class_names: ["background", "submarine"]
  ignore_index: -1

model:
  name: pointnet2
  num_classes: 2
  input_channels: auto
  dropout: 0.3

train:
  epochs: 50
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  use_class_weights: true
  class_weights: [1.0, 3.0]
  log_dir: runs/pointnet2_exp_a
  checkpoint_dir: checkpoints
  checkpoint_prefix: pointnet2_exp_a
  best_metric: submarine_iou

val:
  mode: full_cloud
  num_votes: 5

augment:
  enabled: true
  rotate_z: true
  jitter_std: 0.005
  jitter_clip: 0.02
  scale_min: 0.95
  scale_max: 1.05
  shift_std: 0.02
  point_dropout: 0.05
